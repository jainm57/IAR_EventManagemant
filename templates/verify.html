<!DOCTYPE html>
<html>

<head>
    <title>Verify Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body>

    {% include 'header.html' %}

    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="card p-4 w-100" style="max-width: 400px;">
            <h3 class="text-center mb-4">Security Verification 🔐</h3>

            <p class="text-center mb-4" style="color: #cbd5e1; font-size: 0.95rem;">
                We've sent a 6-digit verification code to your email. Please enter it below to safely log in.
            </p>

            <form method="POST" action="/verify_otp">
                <!-- OTP Input -->
                <div class="mb-4 text-center">
                    <label>Verification Code</label>
                    <input type="text" name="otp" class="w-100 text-center"
                        style="font-size: 1.8rem; letter-spacing: 8px; font-weight: bold; background: rgba(0,0,0,0.3) !important;"
                        maxlength="6" autocomplete="off" required>
                </div>

                <!-- Button -->
                <button type="submit" class="btn w-100 mt-2">
                    <i class="bi bi-shield-check"></i> Verify & Login
                </button>
            </form>

            <p class="text-center mt-4 mb-0">
                <a href="/login" style="font-size: 0.9rem;">🔙 Back to Login</a>
            </p>

        </div>
    </div>

</body>

</html>
