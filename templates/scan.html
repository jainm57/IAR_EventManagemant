<!DOCTYPE html>
<html>
<head>
    <title>Scan QR</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">

    <!-- QR Library -->
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body> <!-- ✅ removed bg-light -->

{% include 'header.html' %}

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">

    <div class="card p-4 text-center" style="width: 400px;"> <!-- ✅ removed shadow -->

        <h3 class="mb-3">Scan QR Code 📷</h3>

        <!-- ✅ FIXED TEXT COLOR -->
        <p class="mb-3" style="color: #ffffff;">
            Point your camera at the QR code to mark your attendance
        </p>

        <!-- Scanner -->
        <div id="reader" style="width:100%;"></div>

        <!-- Back Button -->
        <div class="mt-3">
            <a href="/my_events" class="btn w-100">
                ⬅ Back to My Events
            </a>
        </div>

    </div>

</div>

<script>
function onScanSuccess(decodedText) {
    window.location.href = decodedText;
}

let scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
scanner.render(onScanSuccess);
</script>

<a href="/" class="floating-dashboard-btn">
    🏠
</a>

</body>
</html>
