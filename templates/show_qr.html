<!DOCTYPE html>
<html>
<head>
    <title>Event QR Code</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body> <!-- ✅ removed bg-light -->

{% include 'header.html' %}

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">

    <div class="card p-4 text-center" style="width: 400px;"> <!-- ✅ removed shadow -->

        <h3 class="mb-3">Event QR Code 📱</h3>

        <!-- ✅ FIXED TEXT VISIBILITY -->
        <p style="color: #ffffff;">
            Ask participants to scan this QR code to mark attendance
        </p>

        <!-- QR IMAGE -->
        <div class="my-3">
            <img src="/{{ qr_image }}" class="img-fluid" style="max-width: 250px;">
        </div>

        <!-- ✅ FIXED SUCCESS TEXT -->
        <p style="color: #00ffae; font-weight: bold;">
            Show this QR to students during the event
        </p>

        <!-- BACK BUTTON -->
        <a href="/admin_events" class="btn w-100 mt-3">
            ⬅ Back to Manage Events
        </a>

    </div>

</div>

<a href="/" class="floating-dashboard-btn">
    🏠
</a>

</body>
</html>
