<!DOCTYPE html>
<html>

<head>
    <title>Create Event</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    {% include 'header.html' %}

    <div class="container py-5">

        <div class="card p-4 shadow mx-auto" style="max-width: 900px;">

            <h3 class="text-center mb-4">🎯 Create Event</h3>

            <form method="POST" enctype="multipart/form-data">

                <div class="row">

                    <!-- LEFT SIDE -->
                    <div class="col-md-6">

                        <div class="mb-3">
                            <label>Title</label>
                            <input type="text" name="title" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label>Date</label>
                            <input type="date" name="date" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label>Start Time</label>
                            <input type="time" name="start_time" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label>End Time</label>
                            <input type="time" name="end_time" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label>Venue</label>
                            <select name="venue" class="form-control">
                                {% for v in venues %}
                                <option value="{{ v[1] }}">
                                    {{ v[1] }} ({{ v[2] }} seats)
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                    </div>

                    <!-- RIGHT SIDE -->
                    <div class="col-md-6">

                        <!-- 🔥 PERFECT HEIGHT DESCRIPTION -->
                        <div class="mb-3">
                            <label>Description</label>
                            <textarea name="description" class="form-control desc-box" required></textarea>
                        </div>

                        <div class="mb-3">
                            <label>Department</label>
                            <select name="department" class="form-control">
                                <option value="Department of Computer Science and Engineering">CSE</option>
                                <option value="Department of Biotechnology and Bioengineering">Biotech</option>
                                <option value="Department of Business Management">BBA</option>
                                <option value="Department of Humanities and Sciences">Humanities</option>
                                <option value="Universal">Universal</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label>Upload Flyer</label>
                            <input type="file" name="flyer" class="form-control">
                        </div>

                    </div>

                </div>

                <!-- BUTTONS -->
                <div class="row mt-3">
                    <div class="col-md-6">
                        <button type="submit" class="btn btn-primary w-100">
                            🚀 Create Event
                        </button>
                    </div>
                    <div class="col-md-6">
                        <a href="/" class="btn btn-secondary w-100">
                            ⬅ Back to Dashboard
                        </a>
                    </div>
                </div>

            </form>

        </div>

    </div>

</body>

</html>
