<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body>

{% include 'header.html' %}

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">

    <div class="card p-4 w-100" style="max-width: 400px;"> <!-- ✅ removed shadow -->

        <h3 class="text-center mb-4">Welcome Back 👋</h3>

        <form method="POST">

            <!-- Email -->
            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email" class="w-100" required>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label>Password</label>
                <div class="d-flex align-items-center">

                    <input type="password" name="password" id="password" class="w-100" required>

                    <span onclick="togglePassword()" 
                          style="cursor:pointer; margin-left:10px;">
                        <i class="bi bi-eye" id="eyeIcon"></i>
                    </span>

                </div>
            </div>

            <!-- Button -->
            <button type="submit" class="btn w-100 mt-2">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </button>

        </form>

        <p class="text-center mt-3">
            Don’t have an account? <a href="/register">Register</a>
        </p>

    </div>

</div>

<!-- 🔥 PASSWORD TOGGLE SCRIPT -->
<script>
function togglePassword() {
    let password = document.getElementById("password");
    let icon = document.getElementById("eyeIcon");

    if (password.type === "password") {
        password.type = "text";
        icon.classList.remove("bi-eye");
        icon.classList.add("bi-eye-slash");
    } else {
        password.type = "password";
        icon.classList.remove("bi-eye-slash");
        icon.classList.add("bi-eye");
    }
}
</script>

</body>
</html>
