<!DOCTYPE html>
<html>
<head>
    <title>Participants</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body> <!-- ✅ removed bg-light -->

{% include 'header.html' %}

<div class="container mt-5">

    <h2 class="text-center mb-4">Event Participants 👥</h2>

    <div class="card p-4"> <!-- ✅ removed shadow -->

        <!-- 🔥 TOTAL COUNT -->
        <p class="text-end"><b>Total Participants:</b> {{ participants|length }}</p>

        <table class="table text-center"> <!-- ✅ removed bordered + hover -->

            <thead>
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Email</th>
                </tr>
            </thead>

            <tbody>
                {% for p in participants %}
                <tr>
                    <td>{{ loop.index }}</td>
                    <td>{{ p[0] }}</td>
                    <td>{{ p[1] }}</td>
                </tr>
                {% endfor %}
            </tbody>

        </table>

        <!-- Back Button -->
        <div class="text-center mt-3">
            <a href="/admin_events" class="btn">
                ⬅ Back to Manage Events
            </a>
        </div>

    </div>

</div>

<a href="/" class="floating-dashboard-btn">
    🏠
</a>

</body>
</html>
